{% extends "base.html" %}
{% set page_title = "Add Member" %}
{% block content %}
<div class="page-header">
    <div>
        <h1 class="page-title">Add Member</h1>
        <p class="page-sub">Enrol a new employee so they can register</p>
    </div>
</div>
<div style="max-width:560px">
    <div class="card">
        <div class="card-header"><span class="card-title">Member Details</span></div>
        <div class="card-body">
            <form method="POST">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" placeholder="employee@company.com" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Role</label>
                        <select name="role" required>
                            <option value="">Select role</option>
                            <option value="employee">Employee</option>
                            <option value="team_leader">Team Leader</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Department</label>
                        <select name="department" required>
                            <option value="">Select department</option>
                            <option>HCM</option><option>SCM</option><option>Procurement</option>
                            <option>Finance</option><option>Administration</option>
                            <option>Business Development</option><option>Technical</option>
                        </select>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Enrol Member</button>
                    <a href="{{ url_for('admin.home') }}" class="btn btn-ghost">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
