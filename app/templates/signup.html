{% extends "base.html" %}
{% set page_title = "Sign Up" %}
{% block auth_content %}
<div class="auth-page">
    <div class="auth-left">
        <img src="{{ url_for('static', filename='images/logo.jpg') }}" alt="Logo" class="auth-logo">
        <h1 class="auth-heading">Create<br>Account</h1>
        <div class="auth-divider"></div>
        <p class="auth-sub">You need an authorised email and entry code from your administrator to register.</p>
    </div>
    <div class="auth-right">
        <div class="auth-box">
            <h2>Register</h2>
            <p>Fill in your details to get started</p>
            <form method="POST">
                <div class="form-group">
                    <label>Full name</label>
                    <input type="text" name="username" placeholder="Your full name" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="your@company.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" id="password" placeholder="••••••••" required>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" name="confirm_password" id="confirm_password" placeholder="••••••••" required>
                    <div id="password-flash" class="text-small text-red mt-2"></div>
                </div>
                <div class="form-group">
                    <label>Entry Code</label>
                    <input type="password" name="entry_code" placeholder="Provided by your admin" required>
                </div>
                <button type="submit" id="submit-btn" class="btn btn-primary btn-lg w-full" style="justify-content:center">Create Account</button>
            </form>
            <p class="text-small text-muted mt-3" style="text-align:center">
                Already registered? <a href="{{ url_for('base.login') }}" class="text-blue" style="font-weight:500">Sign in</a>
            </p>
        </div>
    </div>
</div>
<script>
document.getElementById("submit-btn").addEventListener("click", function(e) {
    const pw = document.getElementById("password").value;
    const cpw = document.getElementById("confirm_password").value;
    const flash = document.getElementById("password-flash");
    if (pw !== cpw) { e.preventDefault(); flash.textContent = "Passwords do not match."; }
    else { flash.textContent = ""; }
});
</script>
{% endblock auth_content %}
