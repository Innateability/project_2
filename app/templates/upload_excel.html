{% extends "base.html" %}
{% set page_title = "UPLOAD" %}

{% block content %}
<h2>Upload File</h2>
  <style>

    .upload-card {
      width: 100%;
      max-width: 480px;
      background: #ffffff;
      border: 2px dashed #d1d5db;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      margin: 20px;
      margin-left: 250px;
      margin-top: 100px;
    }

    .upload-card:hover,
    .upload-card.drag-over {
      border-color: #9ca3af;
      background: #f9fafb;
    }

    .upload-icon {
      width: 48px;
      height: 48px;
      border-radius: 10px;
      background: #f3f4f6;
      border: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 6px;
    }

    .upload-icon svg {
      width: 24px;
      height: 24px;
      stroke: #6b7280;
    }

    .upload-title {
      font-size: 15px;
      font-weight: 600;
      color: #111827;
    }

    .upload-sub {
      font-size: 13px;
      color: #6b7280;
    }

    .upload-btns {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .upload-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #374151;
      background: #f9fafb;
      border: 1px solid #d1d5db;
      border-radius: 999px;
      padding: 7px 16px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.12s;
    }

    .upload-btn:hover {
      background: #f3f4f6;
    }

    .upload-btn svg {
      width: 15px;
      height: 15px;
      stroke: #6b7280;
    }

    #file-input { display: none; }

    #status {
      font-size: 13px;
      color: #6b7280;
      margin-top: 4px;
      min-height: 18px;
    }

    .submit-btn {
      margin-top: 12px;
      padding: 9px 28px;
      background: #111827;
      color: #ffffff;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .submit-btn:hover {
      background: #374151;
    }

    .submit-btn:disabled {
      background: #d1d5db;
      cursor: not-allowed;
    }

  </style>

  <form id="upload-form" method="POST" enctype="multipart/form-data" action="">

    <div class="upload-card" id="drop-zone">

      <div class="upload-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
      </div>

      <p class="upload-title">Drop your file here</p>
      <p class="upload-sub">.xlsx, .xls, .csv</p>

      <div class="upload-btns">
        <label class="upload-btn" for="file-input">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="16 16 12 12 8 16"/>
            <line x1="12" y1="12" x2="12" y2="21"/>
            <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
          </svg>
          Upload file
        </label>
      </div>

      <span id="status"></span>
      <input type="file" id="file-input" name="file" accept=".xlsx,.xls,.csv">

      <button type="submit" class="submit-btn" id="submit-btn" disabled>Submit</button>

    </div>

  </form>

  <script>
    const zone = document.getElementById('drop-zone');
    const input = document.getElementById('file-input');
    const status = document.getElementById('status');
    const submitBtn = document.getElementById('submit-btn');

    function handleFile(file) {
      if (!file) return;
      const allowed = ['.xlsx', '.xls', '.csv'];
      const ext = file.name.slice(file.name.lastIndexOf('.')).toLowerCase();
      if (!allowed.includes(ext)) {
        status.textContent = 'Please upload an Excel or CSV file.';
        status.style.color = '#ef4444';
        submitBtn.disabled = true;
        return;
      }
      status.textContent = '"' + file.name + '" ready to upload';
      status.style.color = '#16a34a';
      submitBtn.disabled = false;
    }

    input.addEventListener('change', () => handleFile(input.files[0]));

    zone.addEventListener('dragover', e => {
      e.preventDefault();
      zone.classList.add('drag-over');
    });

    zone.addEventListener('dragleave', () => {
      zone.classList.remove('drag-over');
    });

    zone.addEventListener('drop', e => {
      e.preventDefault();
      zone.classList.remove('drag-over');

      const file = e.dataTransfer.files[0];

      // Transfer dropped file to the actual input
      const dataTransfer = new DataTransfer();
      dataTransfer.items.add(file);
      input.files = dataTransfer.files;

      handleFile(file);
    });

    document.getElementById('upload-form').addEventListener('submit', function(e) {
      if (!input.files || input.files.length === 0) {
        e.preventDefault();
        status.textContent = 'Please select a file before submitting.';
        status.style.color = '#ef4444';
      }
    });
  </script>

{% endblock %}
