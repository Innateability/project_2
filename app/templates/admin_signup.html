{% extends "base.html" %}
{% set page_title = "Admin Signup" %}
{% block auth_content %}
<div class="auth-page">
    <div class="auth-left">
        <img src="{{ url_for('static', filename='images/logo.jpg') }}" alt="Logo" class="auth-logo">
        <h1 class="auth-heading">Admin<br>Signup</h1>
        <div class="auth-divider"></div>
        <p class="auth-sub">Create the primary administrator account. This should only be done once.</p>
    </div>
    <div class="auth-right">
        <div class="auth-box">
            <h2>Create Admin Account</h2>
            <p>Set up the system administrator</p>
            <form method="POST">
                <div class="form-group">
                    <label>Full name</label>
                    <input type="text" name="username" placeholder="Administrator name" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="admin@company.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" id="pw" placeholder="••••••••" required>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="cpw" placeholder="••••••••" required>
                    <div id="pw-err" class="text-small text-red mt-2"></div>
                </div>
                <div class="form-group">
                    <label>Entry Code</label>
                    <input type="password" name="entry_code" placeholder="Admin entry code" required>
                </div>
                <button type="submit" id="admin-submit" class="btn btn-primary btn-lg w-full" style="justify-content:center">Create Admin Account</button>
            </form>
        </div>
    </div>
</div>
<script>
document.getElementById("admin-submit").addEventListener("click", function(e) {
    const pw = document.getElementById("pw").value;
    const cpw = document.getElementById("cpw").value;
    if (pw !== cpw) { e.preventDefault(); document.getElementById("pw-err").textContent = "Passwords do not match."; }
});
</script>
{% endblock auth_content %}
