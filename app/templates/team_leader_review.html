{% extends "base.html" %}
{% set page_title = "Write Review" %}
{% block content %}
<div style="max-width:600px">
    <div class="page-header">
        <div>
            <h1 class="page-title">Write Review</h1>
            <p class="page-sub">{{ objective.objective }}</p>
        </div>
    </div>
    <div class="card">
        <div class="card-header">
            <span class="card-title">Review Details</span>
            <span class="text-small text-muted">Max score: <strong id="scoreRange">{{ objective.score_range }}</strong> &nbsp;|&nbsp; Weight: {{ objective.weight }}%</span>
        </div>
        <div class="card-body">
            <form method="POST" id="reviewForm">
                <div class="form-group">
                    <label>Review Comments</label>
                    <textarea name="review" placeholder="Write your review..." required></textarea>
                </div>
                <div class="form-group">
                    <label>Score (max: {{ objective.score_range }})</label>
                    <input type="number" name="score" id="scoreInput" min="0" max="{{ objective.score_range }}" required>
                    <p id="scoreError" class="text-small text-red mt-2" style="display:none">Score cannot exceed {{ objective.score_range }}.</p>
                </div>
                <div class="form-actions">
                    <button type="submit" id="submitBtn" class="btn btn-primary">Submit Review</button>
                    <button type="button" class="btn btn-ghost" onclick="history.back()">Cancel</button>
                </div>
            </form>
        </div>
    </div>
</div>
<script>
const si = document.getElementById("scoreInput");
const sr = parseInt(document.getElementById("scoreRange").innerText);
si.addEventListener("input", function() {
    const over = parseInt(si.value) > sr;
    document.getElementById("scoreError").style.display = over ? "block" : "none";
    document.getElementById("submitBtn").disabled = over;
});
</script>
{% endblock %}
