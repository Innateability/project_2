{% extends "base.html" %}
{% set page_title = "Add Objectives" %}
{% block content %}
<form method="POST" onsubmit="return validateWeights()">
    <div class="card mb-4">
        <div class="card-header"><span class="card-title">Batch Details</span></div>
        <div class="card-body">
            <div class="form-row">
                <div class="form-group">
                    <label>Batch Title</label>
                    <input type="text" name="title" placeholder="e.g. Q1 2025 Performance" required>
                </div>
                <div class="form-group">
                    <label>Year</label>
                    <input type="number" name="year" placeholder="2025" min="2020" max="2099" required>
                </div>
                <div class="form-group">
                    <label>Commence Date</label>
                    <input type="text" id="startDate" name="start">
                </div>
                <div class="form-group">
                    <label>Deadline</label>
                    <input type="text" id="endDate" name="end">
                </div>
            </div>
        </div>
    </div>
    <div style="padding:14px 22px;border-top:1px solid var(--ash-mid);display:flex;justify-content:flex-end;gap:10px">
            <a href="{{ url_for('admin.home') }}" class="btn btn-ghost">Cancel</a>
            <button type="submit" class="btn btn-primary">Create Batch</button>
        </div>
    </div>
</form>
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script>
  const startPicker = flatpickr("#startDate", {
    enableTime: true,
    dateFormat: "Y-m-d H:i",
    minDate: "today",
    onChange: function(selectedDates) {
      endPicker.set("minDate", selectedDates[0]);
    }
  });

  const endPicker = flatpickr("#endDate", {
    enableTime: true,
    dateFormat: "Y-m-d H:i",
    minDate: "today"
  });
</script>{% endblock %}
