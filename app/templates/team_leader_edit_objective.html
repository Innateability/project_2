{% extends "base.html" %}
{% set page_title = "Edit Objective" %}
{% block content %}
<div style="max-width:660px">
    <div class="page-header">
        <div>
            <h1 class="page-title">Edit Objective</h1>
            <p class="page-sub">Assigned to {{ objective.assigned_to.name }}</p>
        </div>
    </div>
    <div class="card">
        <div class="card-header">
            <span class="card-title">{{ objective.batch.title }}</span>
        </div>
        <div class="card-body">
            <form method="POST" action="{{ url_for('team_leader.edit_objective', objective_id=objective.id) }}">
                <div class="form-row">
                    <div class="form-group">
                        <label>Batch Title</label>
                        <input type="text" name="title" value="{{ objective.batch.title }}" required>
                    </div>
                    <div class="form-group">
                        <label>Year</label>
                        <input type="number" name="year" value="{{ objective.batch.year }}" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Objective</label>
                    <input type="text" name="objective" value="{{ objective.objective }}" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Category</label>
                        <input type="text" name="category" value="{{ objective.category }}" required>
                    </div>
                    <div class="form-group">
                        <label>Weight (%)</label>
                        <input type="number" name="weight" value="{{ objective.weight }}" id="w" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Score Range</label>
                    <input type="number" name="score_range" value="{{ objective.score_range }}" id="sr" required>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                    <button type="button" class="btn btn-ghost" onclick="history.back()">Cancel</button>
                </div>
            </form>
        </div>
    </div>
</div>
<script>
document.querySelector("form").addEventListener("submit", function(e) {
    const w = parseFloat(document.getElementById("w").value);
    const sr = parseFloat(document.getElementById("sr").value);
    let msg = "";
    if (w > 100) msg += "Weight cannot exceed 100%.\n";
    if (sr > 100) msg += "Score range cannot exceed 100.\n";
    if (msg) { e.preventDefault(); alert(msg); }
});
</script>
{% endblock %}
