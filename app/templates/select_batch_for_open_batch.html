{% extends "base.html" %}
{% set page_title = "Objective Batches" %}

{% block content %}
<div class="page-header">
    <div>
        <h1 class="page-title">Select batch</h1>
        <p class="page-sub">Give reviews for selected objectives</p>
    </div>
</div>
<div class="obj-list">
    {% for batch in batches %}
    <a href="{{ url_for('admin.open_objectives' if state == 'admin' else 'team_leader.open_objectives' if state == 'team_leader' else 'employee.open_objectives' if state == 'employee', batch_id=batch.id) }}" class="obj-card">
        <div>
            <div class="obj-card-title">{{ batch.title }}</div>
            <div class="obj-card-meta">
                <span>{{ batch.year }}</span>

            </div>
        </div>
        <div class="obj-card-right">
            <span class="btn btn-sm btn-outline">See Open Objectives &rarr;</span>
        </div>
    </a>
    {% else %}
    <div class="empty-state">
        <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        <h3>No batches found</h3>
    </div>
    {% endfor %}
</div>

{% endblock %}
