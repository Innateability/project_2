{% extends "base.html" %}
{% set page_title = "Login" %}
{% block auth_content %}
<div class="auth-page">
    <div class="auth-left">
        <img src="{{ url_for('static', filename='images/logo.jpg') }}" alt="Logo" class="auth-logo">
        <h1 class="auth-heading">OKR<br>Platform</h1>
        <div class="auth-divider"></div>
        <p class="auth-sub">Align your team around meaningful goals. Track performance and drive results.</p>
    </div>
    <div class="auth-right">
        <div class="auth-box">
            <h2>Welcome back</h2>
            <p>Sign in to continue to your dashboard</p>
            <form method="POST">
                <div class="form-group">
                    <label>Email address</label>
                    <input type="email" name="email" placeholder="you@company.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-full mt-3" style="justify-content:center">Sign In</button>
            </form>
            <p class="text-small text-muted mt-3" style="text-align:center">
                No account? <a href="{{ url_for('base.signup') }}" class="text-blue" style="font-weight:500">Register here</a>
            </p>
        </div>
    </div>
</div>
{% endblock auth_content %}
